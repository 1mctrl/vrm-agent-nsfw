<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>VRM Viewer</title>

  <link rel="stylesheet" href="styles.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
      "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
    }
  }
  </script>
</head>

<body>
  <div id="msg">Загрузка...</div>

<div id="ui">
  <button id="switchAgentBtn">🧍 Агент</button>
  <button id="kissBtn">💋 Поцелуй</button>
  <button id="walkBtn">🚶 Пройтись</button>
  <button id="rumbaBtn">💃 Румба</button>
  <button id="spinBtn">🌀 Крутиться</button>
  <button id="bellyBtn">🪩 Belly</button>
  <button id="hiphopBtn">🎵 Hiphop</button>
  <button id="jumpBtn">🦘 Jump</button>
  <button id="laughBtn">😄 Laugh</button>
  <button id="funnyLaughBtn">🤣 Fun Laugh</button>
  <button id="excitedBtn">✨ Excited</button>
  <button id="cryBtn">😭 Cry</button>
</div>

  <div id="chatPanel">
    <div id="chatMessages"></div>

    <div id="chatInputRow">
      <input id="chatInput" type="text" placeholder="Напиши сообщение..." />
      <button id="sendBtn">Отправить</button>
    </div>
  </div>

  <div id="speechBubble"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
