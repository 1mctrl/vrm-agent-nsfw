name: CI

on:
  push:
    branches: [main, llm-version]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Check package lock
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Ensure private files are not tracked
        run: |
          ! git ls-files | grep -E '(^\.env$|^memory/|^node_modules/|\.session$|\.session-journal$|^luna-telegram/\.venv/)'
